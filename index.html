<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoushuneko Miniatures Gallery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');

        body {
            font-family: 'Oswald', sans-serif;
            margin: 0;
            background-color: white;
            color: black;
            display: flex;
        }

        /* Header Styling */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: black;
            border-bottom: 3px solid #d32f2f;
            display: flex;
            align-items: center;
            z-index: 2000;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .logo span {
            color: #d32f2f; /* Kyoushuneko Red */
        }

        /* Hamburger Button - Hidden on Desktop */
        .hamburger {
            display: none !important; 
            background: none;
            border: 1px solid #555;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 250px;
            height: calc(100vh - 70px);
            background-color: #f4f4f4;
            border-right: 1px solid #ddd;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h3 {
            margin-top: 0;
            border-bottom: 2px solid #d32f2f;
            padding-bottom: 10px;
        }

        .collection-link {
            cursor: pointer;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }

        .collection-link:hover {
            color: #d32f2f;
        }

        /* Main Content Area */
        .main-content {
            margin-top: 70px;
            margin-left: 250px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            transition: margin-left 0.3s ease;
        }

        /* Overlay for Mobile */
        .overlay {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            background: rgba(0,0,0,0.6);
            z-index: 900;
        }

        .overlay.active {
            display: block;
        }

        /* Mobile Adjustments (Triggers on screens 900px or smaller) */
        @media (max-width: 900px) {
            .hamburger {
                display: block !important; /* Forces the button to show */
            }
            .sidebar {
                transform: translateX(-100%); /* Hides sidebar off-screen left */
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.active {
                transform: translateX(0); /* Slides sidebar into view */
            }
            .main-content {
                margin-left: 0; /* Removes the desktop sidebar gap */
            }
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .btn:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <button class="hamburger" id="hamburgerBtn">☰</button>
        <div class="logo">KYOUSHUNEKO <span>MINIATURES</span></div>
    </div>

    <!-- Mobile Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h3>COLLECTIONS</h3>
        <div class="collection-link">WW2 Imperial Japan</div>
        <div class="collection-link">WW2 Finland</div>
        <div class="collection-link">Sikh Desert Raiders (Grimdark)</div>
        <div class="collection-link">Chinese Cathay (9th age/ WP)</div>
        <div class="collection-link">View All Products</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 id="current-category">All Products</h2>
        <div class="gallery" id="gallery">
            <div class="card">
                <h4>Data Syncing...</h4>
                <p>Your CSV products will populate here.</p>
            </div>
        </div>
    </div>

    <!-- Script for Mobile Menu functionality -->
    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const collectionLinks = document.querySelectorAll('.collection-link');

        // Toggle the menu open/closed
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Open menu when hamburger is clicked
        hamburgerBtn.addEventListener('click', toggleMenu);
        
        // Close menu when tapping the dark overlay
        overlay.addEventListener('click', toggleMenu);

        // Close menu automatically when a category is tapped on mobile
        collectionLinks.forEach(link => {
            link.addEventListener('click', () => {
                if(window.innerWidth <= 900) {
                    toggleMenu();
                }
            });
        });
    </script>
</body>
</html>
